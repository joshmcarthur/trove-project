version: "2"
run:
  tests: false
linters:
  enable:
    - errcheck
    - gosec
    - govet
    - staticcheck
    - unused
  settings:
    gosec:
      severity: medium
      confidence: medium
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
