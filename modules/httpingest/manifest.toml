name     = "http-ingest"
version  = "1.0"
kind     = "source"
provides = [
  "trove://type/http/ingest/received/1",
  "trove://type/note/*",
  "trove://type/shortcut/*",
  "trove://type/shortcuts/*",
]
max_body_bytes = 10485760

[[types]]
name = "http.ingest.received"
version = 1
schema = "../../types/builtin/http.ingest.received.ttd.json"

[[types]]
name = "note.created"
version = 1
schema = "../../types/builtin/note.created.ttd.json"

[[types]]
name = "shortcuts.share.saved"
version = 1
schema = "../../types/builtin/shortcuts.share.saved.ttd.json"

[[types]]
name = "shortcuts.note.created"
version = 1
schema = "../../types/builtin/shortcuts.note.created.ttd.json"

[[types]]
name = "shortcuts.url.saved"
version = 1
schema = "../../types/builtin/shortcuts.url.saved.ttd.json"

[[types]]
name = "shortcuts.location.checked"
version = 1
schema = "../../types/builtin/shortcuts.location.checked.ttd.json"

[[types]]
name = "shortcuts.clipboard.saved"
version = 1
schema = "../../types/builtin/shortcuts.clipboard.saved.ttd.json"

[[http.routes]]
method = "POST"
path   = "/records"

[[http.routes]]
method = "PUT"
path   = "/blobs"
