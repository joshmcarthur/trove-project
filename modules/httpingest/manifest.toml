name     = "http-ingest"
version  = "1.0"
kind     = "source"
provides = [
  "trove://type/http/ingest/received/1",
  "trove://type/note/*",
  "trove://type/shortcut/*",
  "trove://type/shortcuts/*",
]
max_body_bytes = 10485760

[[types]]
name = "http.ingest.received"
version = 1
schema = "../../types/builtin/http.ingest.received.ttd.json"

[[types]]
name = "note.created"
version = 1
schema = "../../types/builtin/note.created.ttd.json"

[[http.routes]]
method = "POST"
path   = "/ingest/{source}"

[[http.routes]]
method = "PUT"
path   = "/blobs"
