name     = "capture-classifier"
version  = "1.0"
kind     = "source"
provides = [
  "classify.*",
  "note.*",
  "shortcuts.*",
]
max_body_bytes = 10485760

[[http.routes]]
method = "POST"
path   = "/capture/{source}"

[[http.routes]]
method = "POST"
path   = "/classify"

[[http.routes]]
method = "GET"
path   = "/pending"

[[mcp.tools]]
name = "classify_event"
description = "Classify a pending capture into a typed event"

[[mcp.tools]]
name = "list_unclassified_captures"
description = "List classify.pending events not yet classified"
