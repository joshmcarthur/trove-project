name     = "telegram-source"
version  = "1.0"
kind     = "source"
provides = [
  "trove://type/note/*",
]
name = "note.quick"
version = 1
schema = "../../types/builtin/note.quick.ttd.json"

[[types]]
name = "note.bookmark"
version = 1
schema = "../../types/builtin/note.bookmark.ttd.json"

# Set TELEGRAM_BOT_TOKEN in the environment or bot_token below.
bot_token_env    = "TELEGRAM_BOT_TOKEN"
allowed_chat_ids = []
poll_timeout_sec = 30
max_file_bytes   = 52428800
session_ttl_min  = 30

[[bot.types]]
label       = "Quick note"
target_type = "trove://type/note/quick/1"

[[bot.types]]
label       = "Bookmark"
target_type = "trove://type/note/bookmark/1"

[[bot.commands]]
command     = "note"
description = "Quick note (skip picker)"
target_type = "trove://type/note/quick/1"
fast_path   = true

  [[bot.commands.fields]]
  name     = "title"
  prompt   = "Add a title? (/skip)"
  required = false

[[bot.commands]]
command     = "bookmark"
description = "Bookmark (skip picker)"
target_type = "trove://type/note/bookmark/1"
fast_path   = true

  [[bot.commands.fields]]
  name     = "url"
  prompt   = "URL?"
  required = true
