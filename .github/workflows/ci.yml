name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Verify formatting
        run: |
          gofmt -l . | tee /dev/stderr | (! read)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -cover ./...

      - name: Build
        run: make build

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
