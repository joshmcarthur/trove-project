name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Verify formatting
        run: |
          gofmt -l . | tee /dev/stderr | (! read)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -cover ./...

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
