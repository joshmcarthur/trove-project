syntax = "proto3";

package trove.v1;

option go_package = "github.com/joshmcarthur/trove/internal/modules/rpc;troverpc";

// Revision mirrors journal.Revision for RPC transport.
message Reference {
  string ref = 1;
  string rel = 2;
}

message Revision {
  string id = 1;
  string time = 2; // RFC3339
  string type = 3;
  string source = 4;
  bytes payload = 5; // JSON
  string blob_ref = 6;
  string schema_ref = 7;
  string operation = 8;
  string record_ref = 9;
  bytes transforms = 10; // JSON Patch array
  string producer = 11; // host-stamped module identity; read-only for modules
  bytes references = 12; // JSON array; omit on apply = unchanged
}

message AppendRevisionRequest {
  string operation = 1;
  string record_ref = 2;
  string type = 3;
  string time = 4; // RFC3339
  string source = 5;
  bytes payload = 6;
  bytes transforms = 7;
  string blob_ref = 8;
  bytes references = 9; // JSON array; omit on apply = unchanged
}

message AppendRevisionResponse {
  string revision_id = 1;
  string record_ref = 2;
  int32 version = 3;
  string completeness = 4;
  string operation = 5;
}

// CoreServices is implemented by the Trove parent process. Modules reach it
// through trovemodule.Core; see RunRequest.services_broker_id for the internal
// plugin wire format.
service CoreServices {
  rpc AppendRevision(AppendRevisionRequest) returns (AppendRevisionResponse);
  rpc BlobPut(BlobPutRequest) returns (BlobPutResponse);
  rpc GetRevision(GetRevisionRequest) returns (Revision);
  rpc SearchRevisions(SearchRevisionsRequest) returns (SearchRevisionsResponse);
  rpc GetRevisionsByType(GetRevisionsByTypeRequest) returns (SearchRevisionsResponse);
  rpc GetRecord(GetRecordRequest) returns (Record);
  rpc SearchRecords(SearchRecordsRequest) returns (SearchRecordsResponse);
  rpc ListIncompleteRecords(ListIncompleteRecordsRequest) returns (ListIncompleteRecordsResponse);
  rpc SummarizeRange(SummarizeRangeRequest) returns (Summary);
  rpc ListMCPTools(ListMCPToolsRequest) returns (ListMCPToolsResponse);
  rpc CallMCPTool(MCPToolCallRequest) returns (MCPToolCallResponse);
  rpc ListTypes(ListTypesRequest) returns (ListTypesResponse);
  rpc GetType(GetTypeRequest) returns (GetTypeResponse);
  rpc ExportType(ExportTypeRequest) returns (ExportTypeResponse);
  rpc ValidateTypeDefinition(ValidateTypeDefinitionRequest) returns (ValidateTypeDefinitionResponse);
}

message BlobPutRequest {
  bytes data = 1;
}

message BlobPutResponse {
  string blob_ref = 1;
}

message GetRevisionRequest {
  string id = 1;
}

message SearchRevisionsRequest {
  string query = 1;
  string type_prefix = 2;
  string source = 3;
  string time_from = 4; // optional RFC3339
  string time_to = 5;   // optional RFC3339
}

message SearchRevisionsResponse {
  repeated Revision revisions = 1;
}

message GetRevisionsByTypeRequest {
  string type = 1;
  string time_from = 2; // optional RFC3339
  string time_to = 3;   // optional RFC3339
}

// Record mirrors the folded record_heads projection for RPC transport.
message Record {
  string record_ref = 1;
  int32 version = 2;
  string completeness = 3;
  string type = 4;
  string source = 5;
  bytes body = 6; // JSON
  string content_ref = 7;
  string updated_at = 8; // RFC3339
  repeated Reference references = 9;
}

message GetRecordRequest {
  string record_ref = 1;
  int32 version = 2; // optional; 0 returns latest
}

message SearchRecordsRequest {
  string query = 1;
  string type_prefix = 2;
  string source = 3;
  string time_from = 4; // optional RFC3339
  string time_to = 5;   // optional RFC3339
  bool include_deleted = 6;
}

message SearchRecordsResponse {
  repeated Record records = 1;
}

message ListIncompleteRecordsRequest {
  string source = 1;
  int32 limit = 2;
}

message ListIncompleteRecordsResponse {
  repeated Record records = 1;
}

message SummarizeRangeRequest {
  string time_from = 1; // RFC3339
  string time_to = 2;   // RFC3339
}

message Summary {
  string time_from = 1;
  string time_to = 2;
  int32 total = 3;
  map<string, int32> by_type = 4;
  repeated Revision notable = 5;
}

message HTTPRequest {
  string method = 1;
  string path = 2;
  string matched_pattern = 3;
  map<string, string> path_values = 4;
  map<string, string> headers = 5;
  bytes body = 6;
}

message HTTPResponse {
  int32 status = 1;
  map<string, string> headers = 2;
  bytes body = 3;
}

message AuthRequest {
  string validator_id = 1;
  string method = 2;
  string path = 3;
  string matched_pattern = 4;
  map<string, string> path_values = 5;
  map<string, string> headers = 6;
  string route_module = 7;
}

message AuthResponse {
  bool allowed = 1;
  int32 status = 2;
  string message = 3;
  map<string, string> headers = 4;
}

// HTTPModule is implemented by modules that handle HTTP routes via the gateway.
service HTTPModule {
  rpc HandleHTTP(HTTPRequest) returns (HTTPResponse);
}

// AuthModule is implemented by modules that validate gateway requests.
service AuthModule {
  rpc ValidateAuth(AuthRequest) returns (AuthResponse);
}

message MCPToolDescriptor {
  string name = 1;
  string description = 2;
  string module = 3;
}

message ListMCPToolsRequest {}

message ListMCPToolsResponse {
  repeated MCPToolDescriptor tools = 1;
}

message MCPToolCallRequest {
  string name = 1;
  bytes arguments_json = 2;
}

message MCPToolCallResponse {
  bytes result_json = 1;
  bool is_error = 2;
  string message = 3;
}

// MCPModule is implemented by modules that provide MCP tools.
service MCPModule {
  rpc CallTool(MCPToolCallRequest) returns (MCPToolCallResponse);
}

message TypeSummary {
  string uri = 1;
  string title = 2;
  string description = 3;
  string source = 4;
  string source_path = 5;
  string schema_ref = 6;
  string status = 7;
}

message ListTypesRequest {
  string source_filter = 1;
}

message ListTypesResponse {
  repeated TypeSummary types = 1;
}

message GetTypeRequest {
  string uri = 1;
}

message GetTypeResponse {
  TypeSummary summary = 1;
  bytes definition_json = 2;
}

message ExportTypeRequest {
  string uri = 1;
}

message ExportTypeResponse {
  bytes ttd_json = 1;
  string schema_ref = 2;
}

message ValidateTypeDefinitionRequest {
  bytes ttd_json = 1;
}

message ValidateTypeDefinitionResponse {
  bool valid = 1;
  string uri = 2;
  string error = 3;
}

message CLICommandRequest {
  string command = 1;
  repeated string args = 2;
}

message CLICommandResponse {
  int32 exit_code = 1;
  bytes stdout = 2;
  bytes stderr = 3;
}

// CLIModule is implemented by modules that provide CLI commands.
service CLIModule {
  rpc RunCommand(CLICommandRequest) returns (CLICommandResponse);
}

message RunRequest {
  // Internal plugin wire format: parent-process handle for CoreServices.
  // Module authors use trovemodule.Core instead.
  uint32 services_broker_id = 1;
}

message RunResponse {}

message HealthcheckRequest {}

message HealthcheckResponse {
  bool ok = 1;
  string message = 2;
}

// SourceModule is implemented by source modules; the core calls Run to start emission.
service SourceModule {
  rpc Run(RunRequest) returns (RunResponse);
  rpc Healthcheck(HealthcheckRequest) returns (HealthcheckResponse);
}

// DispatchContext carries routing metadata for revision processors and sinks.
// It is not persisted in the journal.
message DispatchContext {
  string root_id = 1;
  repeated string seen = 2;
}

message ProcessRequest {
  Revision revision = 1;
  DispatchContext context = 2;
}

message ProcessResponse {
  repeated Revision revisions = 1;
}

message HandleRequest {
  Revision revision = 1;
  DispatchContext context = 2;
}

message HandleResponse {}

// ProcessorModule is implemented by revision-routing processor modules.
service ProcessorModule {
  rpc Process(ProcessRequest) returns (ProcessResponse);
  rpc Healthcheck(HealthcheckRequest) returns (HealthcheckResponse);
}

// SinkModule is implemented by revision-routing sink modules.
service SinkModule {
  rpc Handle(HandleRequest) returns (HandleResponse);
  rpc Healthcheck(HealthcheckRequest) returns (HealthcheckResponse);
}
