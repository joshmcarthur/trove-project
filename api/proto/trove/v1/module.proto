syntax = "proto3";

package trove.v1;

option go_package = "github.com/joshmcarthur/trove/internal/modules/rpc;troverpc";

// Event mirrors journal.Event for RPC transport.
message Event {
  string id = 1;
  string time = 2; // RFC3339
  string type = 3;
  string source = 4;
  bytes payload = 5; // JSON
  string blob_ref = 6;
}

message EmitResponse {}

// CoreServices is implemented by the Trove parent process. Modules reach it
// through trovemodule.Core; see RunRequest.services_broker_id for the internal
// plugin wire format.
service CoreServices {
  rpc Emit(Event) returns (EmitResponse);
  rpc BlobPut(BlobPutRequest) returns (BlobPutResponse);
  rpc GetEvent(GetEventRequest) returns (Event);
  rpc SearchEvents(SearchEventsRequest) returns (SearchEventsResponse);
  rpc GetEventsByType(GetEventsByTypeRequest) returns (SearchEventsResponse);
  rpc SummarizeRange(SummarizeRangeRequest) returns (Summary);
}

message BlobPutRequest {
  bytes data = 1;
}

message BlobPutResponse {
  string blob_ref = 1;
}

message GetEventRequest {
  string id = 1;
}

message SearchEventsRequest {
  string query = 1;
  string type_prefix = 2;
  string source = 3;
  string time_from = 4; // optional RFC3339
  string time_to = 5;   // optional RFC3339
}

message SearchEventsResponse {
  repeated Event events = 1;
}

message GetEventsByTypeRequest {
  string type = 1;
  string time_from = 2; // optional RFC3339
  string time_to = 3;   // optional RFC3339
}

message SummarizeRangeRequest {
  string time_from = 1; // RFC3339
  string time_to = 2;   // RFC3339
}

message Summary {
  string time_from = 1;
  string time_to = 2;
  int32 total = 3;
  map<string, int32> by_type = 4;
  repeated Event notable = 5;
}

message HTTPRequest {
  string method = 1;
  string path = 2;
  string matched_pattern = 3;
  map<string, string> path_values = 4;
  map<string, string> headers = 5;
  bytes body = 6;
}

message HTTPResponse {
  int32 status = 1;
  map<string, string> headers = 2;
  bytes body = 3;
}

// HTTPModule is implemented by modules that handle HTTP routes via the gateway.
service HTTPModule {
  rpc HandleHTTP(HTTPRequest) returns (HTTPResponse);
}

message RunRequest {
  // Internal plugin wire format: parent-process handle for CoreServices.
  // Module authors use trovemodule.Core instead.
  uint32 services_broker_id = 1;
}

message RunResponse {}

message HealthcheckRequest {}

message HealthcheckResponse {
  bool ok = 1;
  string message = 2;
}

// SourceModule is implemented by source modules; the core calls Run to start emission.
service SourceModule {
  rpc Run(RunRequest) returns (RunResponse);
  rpc Healthcheck(HealthcheckRequest) returns (HealthcheckResponse);
}
